name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # للسماح بالتشغيل اليدوي

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/al-waleed-api' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} << 'ENDSSH'
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/var/www/al-waleed-api' }}
            
            echo "🔄 Pulling latest changes..."
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master
            
            echo "🐳 Stopping Docker containers..."
            docker compose down || true
            
            echo "🔨 Building Docker images..."
            docker compose build --no-cache
            
            echo "🚀 Starting Docker containers..."
            docker compose up -d
            
            echo "⏳ Waiting for services to be ready..."
            sleep 10
            
            echo "📦 Running migrations..."
            docker compose exec -T app php artisan migrate --force || true
            
            echo "🧹 Clearing cache..."
            docker compose exec -T app php artisan config:clear
            docker compose exec -T app php artisan cache:clear
            docker compose exec -T app php artisan route:clear
            docker compose exec -T app php artisan view:clear
            
            echo "✨ Optimizing for production..."
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache
            
            echo "✅ Deployment completed successfully!"
          ENDSSH

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

